# ─── Nginx Configuration for ShipTrack Pro ─────────────────────────────────────
# Place at: /etc/nginx/sites-available/shiptrack-pro
# Enable with: sudo ln -s /etc/nginx/sites-available/shiptrack-pro /etc/nginx/sites-enabled/
# Test config: sudo nginx -t
# Reload: sudo systemctl reload nginx

# ─── Rate limiting zones ────────────────────────────────────────────────────────
limit_req_zone  $binary_remote_addr  zone=api_limit:10m    rate=30r/m;
limit_req_zone  $binary_remote_addr  zone=auth_limit:10m   rate=5r/m;

# ─── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── Main HTTPS Server ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # ── SSL/TLS Configuration ──────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    # Modern TLS settings
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_timeout       1d;
    ssl_session_cache         shared:SSL:50m;
    ssl_session_tickets       off;

    # HSTS (2 years)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Security Headers (XSS, Clickjacking, MIME sniffing prevention) ─────────
    add_header X-Frame-Options            "SAMEORIGIN"     always;
    add_header X-Content-Type-Options     "nosniff"        always;
    add_header X-XSS-Protection           "1; mode=block"  always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy         "geolocation=(), microphone=(), camera=()" always;

    # ── Gzip Compression ───────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/javascript application/json application/xml
               application/xml+rss;

    # ── React Frontend (Static Files) ──────────────────────────────────────────
    root /var/www/shiptrack-pro/client/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;  # SPA routing
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Node.js API Proxy ──────────────────────────────────────────────────────
    location /api/ {
        # Apply general rate limit
        limit_req zone=api_limit burst=50 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Extra strict rate limiting on auth endpoints
    location /api/auth/login {
        limit_req zone=auth_limit burst=2 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /api/auth/register {
        limit_req zone=auth_limit burst=2 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Socket.IO Proxy ────────────────────────────────────────────────────────
    location /socket.io/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ── File Uploads ───────────────────────────────────────────────────────────
    location /uploads/ {
        alias /var/www/shiptrack-pro/server/uploads/;
        expires 1d;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options "nosniff" always;

        # Only allow images
        location ~* \.(jpg|jpeg|png|gif|webp)$ {
            allow all;
        }
        location ~ {
            deny all;
        }
    }

    # ── Block common attack patterns ───────────────────────────────────────────
    location ~ /\. {
        deny all;  # Block access to hidden files
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # ── Logging ────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/shiptrack-access.log combined;
    error_log  /var/log/nginx/shiptrack-error.log warn;

    # ── Client body size ───────────────────────────────────────────────────────
    client_max_body_size 10M;
}
