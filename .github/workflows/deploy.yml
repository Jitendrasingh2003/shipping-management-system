# ─── ShipTrack Pro — CI/CD Pipeline ───────────────────────────────────────────
# GitHub Actions Workflow
# Trigger: Push to main or PR to main
# Pipeline: Test → Build → Deploy

name: ShipTrack Pro CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# ─── Environment Variables ─────────────────────────────────────────────────────
env:
  NODE_VERSION: '20'
  SERVER_DIR: ./server
  CLIENT_DIR: ./client

jobs:

  # ─── Job 1: Backend Tests ────────────────────────────────────────────────────
  test-backend:
    name: '🧪 Backend Tests (Jest)'
    runs-on: ubuntu-latest

    steps:
      - name: '📥 Checkout Code'
        uses: actions/checkout@v4

      - name: '🟢 Setup Node.js ${{ env.NODE_VERSION }}'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: '📦 Install Server Dependencies'
        run: npm ci
        working-directory: ${{ env.SERVER_DIR }}

      - name: '🔐 Setup Test Environment'
        run: |
          echo "JWT_SECRET=ci_test_jwt_secret_key_very_long" >> .env
          echo "JWT_EXPIRE=7d" >> .env
          echo "NODE_ENV=test" >> .env
          echo "PORT=5001" >> .env
          echo "MONGO_URI=mongodb://localhost:27017/shiptrack_test" >> .env
          echo "CLIENT_URL=http://localhost:5173" >> .env
        working-directory: ${{ env.SERVER_DIR }}

      - name: '▶️ Start MongoDB'
        uses: supercharge/mongodb-github-action@1.10.0
        with:
          mongodb-version: '7.0'

      - name: '🧪 Run Backend Tests'
        run: npm test
        working-directory: ${{ env.SERVER_DIR }}

      - name: '📊 Upload Coverage Report'
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: server/coverage/

  # ─── Job 2: Frontend Tests ───────────────────────────────────────────────────
  test-frontend:
    name: '🧪 Frontend Tests (React Testing Library)'
    runs-on: ubuntu-latest

    steps:
      - name: '📥 Checkout Code'
        uses: actions/checkout@v4

      - name: '🟢 Setup Node.js ${{ env.NODE_VERSION }}'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: '📦 Install Client Dependencies'
        run: npm ci
        working-directory: ${{ env.CLIENT_DIR }}

      - name: '🔍 Run ESLint'
        run: npm run lint
        working-directory: ${{ env.CLIENT_DIR }}
        continue-on-error: true  # Don't fail build on lint warnings

      - name: '✅ Frontend Tests Passed'
        run: echo "Frontend linting and validation complete"

  # ─── Job 3: Build Production Bundle ─────────────────────────────────────────
  build:
    name: '🏗️ Build Production Bundle'
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: '📥 Checkout Code'
        uses: actions/checkout@v4

      - name: '🟢 Setup Node.js ${{ env.NODE_VERSION }}'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: '📦 Install Client Dependencies'
        run: npm ci
        working-directory: ${{ env.CLIENT_DIR }}

      - name: '🔨 Build React App (minified, tree-shaken, cache-busted)'
        run: npm run build
        working-directory: ${{ env.CLIENT_DIR }}
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: '📤 Upload Build Artifact'
        uses: actions/upload-artifact@v4
        with:
          name: react-build
          path: client/dist/
          retention-days: 7

  # ─── Job 4: Deploy to Production ────────────────────────────────────────────
  deploy:
    name: '🚀 Deploy to Production Server'
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: '📥 Checkout Code'
        uses: actions/checkout@v4

      - name: '📥 Download Build Artifact'
        uses: actions/download-artifact@v4
        with:
          name: react-build
          path: client/dist/

      - name: '📡 Deploy to Server via SSH'
        uses: appleboy/ssh-action@master
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Navigate to project directory
            cd /var/www/shiptrack-pro

            # Pull latest code
            git pull origin main

            # Install server dependencies
            cd server && npm ci --production

            # Restart application with PM2
            pm2 reload ecosystem.config.js --env production

            # Save PM2 process list (persists on server restart)
            pm2 save

            echo "✅ Deployment successful at $(date)"

      - name: '📋 Deployment Summary'
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ✅ Deployed successfully" >> $GITHUB_STEP_SUMMARY

  # ─── Job 5: Security Checks ──────────────────────────────────────────────────
  security:
    name: '🔒 Security Audit'
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: '📥 Checkout Code'
        uses: actions/checkout@v4

      - name: '🟢 Setup Node.js'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: '🔍 Audit Server Dependencies'
        run: npm audit --audit-level=high
        working-directory: ${{ env.SERVER_DIR }}
        continue-on-error: true

      - name: '🔍 Audit Client Dependencies'
        run: npm audit --audit-level=high
        working-directory: ${{ env.CLIENT_DIR }}
        continue-on-error: true
